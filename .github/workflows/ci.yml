name: Apple backend CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: |
          set -euo pipefail
          brew update
          brew install ast-grep swiftformat swiftlint
      - name: SwiftFormat lint
        run: swiftformat . --lint --config .swiftformat
      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml
      - name: ast-grep
        run: sg scan Sources Tests --inline-rules "$(cat .ci/sg/swift.yml)" --report-style short

  build-debug:
    name: build-debug
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Sync WaterUI header
        run: ./.github/scripts/setup-waterui.sh
      - name: Build debug
        run: swift build --configuration debug -Xswiftc -warnings-as-errors

  build-release:
    name: build-release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Sync WaterUI header
        run: ./.github/scripts/setup-waterui.sh
      - name: Build release
        run: swift build --configuration release -Xswiftc -warnings-as-errors

  test:
    name: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Sync WaterUI header
        run: ./.github/scripts/setup-waterui.sh
      - name: Run tests
        run: swift test -Xswiftc -warnings-as-errors

  periphery:
    name: periphery
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Sync WaterUI header
        run: ./.github/scripts/setup-waterui.sh
      - name: Install Periphery
        run: |
          set -euo pipefail
          brew update
          brew install periphery
      - name: Run Periphery
        run: periphery scan --config .periphery.yml

  notify-waterui:
    name: notify-waterui
    runs-on: ubuntu-latest
    needs: [lint, build-debug, build-release, test, periphery]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send repository_dispatch to waterui
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SUBMODULE_UPDATE_PAT }}
          repository: water-rs/waterui
          event-type: update-apple-backend
