name: Main Gate Examples

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SHARD_TOTAL: 4

jobs:
  examples-ios:
    name: examples-ios-${{ matrix.shard }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout WaterUI main
        uses: actions/checkout@v4
        with:
          repository: water-rs/waterui
          path: waterui
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: main-gate-ios

      - name: Install water CLI
        run: cargo install --path waterui/cli --locked

      - name: Boot iOS simulator
        run: |
          set -euo pipefail
          simulator_udid="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          if [[ -z "${simulator_udid}" ]]; then
            echo "::error::No available iPhone simulator found."
            exit 1
          fi
          echo "SIMULATOR_UDID=${simulator_udid}" >> "${GITHUB_ENV}"
          xcrun simctl boot "${simulator_udid}" || true
          xcrun simctl bootstatus "${simulator_udid}" -b

      - name: Run iOS example shard
        env:
          PLATFORM: ios
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ env.SHARD_TOTAL }}
          WATERUI_DIR: ${{ github.workspace }}/waterui
          EXAMPLE_LOG_DIR: ${{ github.workspace }}/example-logs
        run: ./.github/scripts/run-example-shard.sh

      - name: Upload iOS shard logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-logs-ios-${{ matrix.shard }}
          path: example-logs/
          retention-days: 7

  examples-macos:
    name: examples-macos-${{ matrix.shard }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout WaterUI main
        uses: actions/checkout@v4
        with:
          repository: water-rs/waterui
          path: waterui
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: main-gate-macos

      - name: Install water CLI
        run: cargo install --path waterui/cli --locked

      - name: Run macOS example shard
        env:
          PLATFORM: macos
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ env.SHARD_TOTAL }}
          WATERUI_DIR: ${{ github.workspace }}/waterui
          EXAMPLE_LOG_DIR: ${{ github.workspace }}/example-logs
        run: ./.github/scripts/run-example-shard.sh

      - name: Upload macOS shard logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-logs-macos-${{ matrix.shard }}
          path: example-logs/
          retention-days: 7

  main-gate-examples:
    name: main-gate-examples
    if: always()
    runs-on: ubuntu-latest
    needs: [examples-ios, examples-macos]
    steps:
      - name: Validate matrix results
        run: |
          set -euo pipefail
          if [[ "${{ needs.examples-ios.result }}" != "success" ]]; then
            echo "::error::iOS examples failed."
            exit 1
          fi
          if [[ "${{ needs.examples-macos.result }}" != "success" ]]; then
            echo "::error::macOS examples failed."
            exit 1
          fi
